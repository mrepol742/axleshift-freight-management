name: Docker CI

on:
  workflow_run:
    workflows: ["Build CI"]
    types:
      - completed
  workflow_dispatch:

jobs:
  docker:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: "ubuntu-latest"

    defaults:
      run:
        working-directory: server

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.APP_DOCKER_USERNAME }}
          password: ${{ secrets.APP_DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t mrepol742/axleshift-server:latest .

      - name: Push Docker image
        run: |
          docker push mrepol742/axleshift-server:latest

      - name: Run Docker container
        run: |
          docker run -d -p 5051:5051 --name axleshift-server mrepol742/axleshift-server:latest

      - name: Check container logs
        run: |
          docker logs axleshift-server

      - name: Stop and remove container
        if: always()
        run: |
          docker stop axleshift-server
          docker rm axleshift-server
